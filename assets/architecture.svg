<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F9FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E0F2FE;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="condGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBEB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FEF3C7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="reportGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D1FAE5;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E0E7FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EDE9FE;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="680" fill="#FAFAFA" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1E1B4B">Knowledge Healer v1.2 — 3+2 Agent 架构</text>
  <text x="450" y="55" text-anchor="middle" font-size="10" fill="#6B7280">Token Economy 优化：合并共享上下文 + 条件激活 + 三层递进</text>

  <!-- Main CC Box -->
  <rect x="180" y="70" width="540" height="70" rx="12" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="450" y="98" text-anchor="middle" font-size="15" font-weight="600" fill="white">主 CC（调度者 + 综合者）</text>
  <text x="450" y="118" text-anchor="middle" font-size="10" fill="#C7D2FE">初始化 → 预扫描决策 → 分派Agent → 综合报告 | 直接执行：Inbox Aging / Coverage Gap</text>

  <!-- Pre-scan layer -->
  <rect x="250" y="155" width="400" height="40" rx="8" fill="url(#scanGrad)" stroke="#818CF8" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="178" text-anchor="middle" font-size="11" font-weight="500" fill="#3730A3">Phase 1.5 预扫描决策 — 元数据分析 → 决定激活哪些Agent</text>

  <!-- Spawn arrows -->
  <line x1="320" y1="195" x2="170" y2="240" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="450" y1="195" x2="450" y2="240" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="530" y1="195" x2="620" y2="240" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="580" y1="195" x2="790" y2="240" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Labels -->
  <text x="260" y="225" text-anchor="middle" font-size="9" fill="#6366F1">必选</text>
  <text x="650" y="225" text-anchor="middle" font-size="9" fill="#D97706">条件激活</text>

  <!-- Agent 1: Structure (merged Staleness + Links) -->
  <rect x="60" y="245" width="220" height="120" rx="10" fill="url(#agentGrad)" stroke="#0EA5E9" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="245" width="220" height="28" rx="10" fill="#0EA5E9"/>
  <rect x="60" y="263" width="220" height="10" fill="#0EA5E9"/>
  <text x="170" y="266" text-anchor="middle" font-size="12" font-weight="600" fill="white">🏗️ Agent-Structure</text>
  <text x="170" y="292" text-anchor="middle" font-size="10" font-weight="500" fill="#0C4A6E">合并：过期检测 + 断链检测</text>
  <line x1="70" y1="302" x2="270" y2="302" stroke="#BAE6FD" stroke-width="0.5"/>
  <text x="170" y="318" text-anchor="middle" font-size="9" fill="#475569">共享文档元数据上下文</text>
  <text x="170" y="333" text-anchor="middle" font-size="9" fill="#475569">多信号加权 + 链接校验</text>
  <text x="170" y="348" text-anchor="middle" font-size="9" fill="#475569">交叉：断链→过期合并修复</text>
  <text x="170" y="363" text-anchor="middle" font-size="9" fill="#059669">token -40% vs 分开spawn</text>

  <!-- Agent 2: Contradiction -->
  <rect x="310" y="245" width="200" height="120" rx="10" fill="url(#agentGrad)" stroke="#0EA5E9" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="310" y="245" width="200" height="28" rx="10" fill="#0EA5E9"/>
  <rect x="310" y="263" width="200" height="10" fill="#0EA5E9"/>
  <text x="410" y="266" text-anchor="middle" font-size="12" font-weight="600" fill="white">⚡ Agent-Contradiction</text>
  <text x="410" y="292" text-anchor="middle" font-size="10" font-weight="500" fill="#0C4A6E">冲突检测</text>
  <line x1="320" y1="302" x2="500" y2="302" stroke="#BAE6FD" stroke-width="0.5"/>
  <text x="410" y="318" text-anchor="middle" font-size="9" fill="#475569">主题聚类 → 断言对比</text>
  <text x="410" y="333" text-anchor="middle" font-size="9" fill="#475569">只接收内容摘要（非全文）</text>
  <text x="410" y="348" text-anchor="middle" font-size="9" fill="#94A3B8">条件：文档数 ≥ 10</text>

  <!-- Agent 3: Drift -->
  <rect x="540" y="245" width="160" height="120" rx="10" fill="url(#condGrad)" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="540" y="245" width="160" height="28" rx="10" fill="#F59E0B"/>
  <rect x="540" y="263" width="160" height="10" fill="#F59E0B"/>
  <text x="620" y="266" text-anchor="middle" font-size="12" font-weight="600" fill="white">🌊 Agent-Drift</text>
  <text x="620" y="292" text-anchor="middle" font-size="10" font-weight="500" fill="#78350F">漂移检测</text>
  <line x1="550" y1="302" x2="690" y2="302" stroke="#FDE68A" stroke-width="0.5"/>
  <text x="620" y="318" text-anchor="middle" font-size="9" fill="#475569">文档断言 vs 群聊信号</text>
  <text x="620" y="333" text-anchor="middle" font-size="9" fill="#475569">跨源交叉验证</text>
  <text x="620" y="348" text-anchor="middle" font-size="9" fill="#94A3B8">条件：chat_groups 非空</text>

  <!-- Agent 4: Leakage -->
  <rect x="720" y="245" width="160" height="120" rx="10" fill="url(#condGrad)" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="720" y="245" width="160" height="28" rx="10" fill="#F59E0B"/>
  <rect x="720" y="263" width="160" height="10" fill="#F59E0B"/>
  <text x="800" y="266" text-anchor="middle" font-size="12" font-weight="600" fill="white">💧 Agent-Leakage</text>
  <text x="800" y="292" text-anchor="middle" font-size="10" font-weight="500" fill="#78350F">管线泄漏</text>
  <line x1="730" y1="302" x2="870" y2="302" stroke="#FDE68A" stroke-width="0.5"/>
  <text x="800" y="318" text-anchor="middle" font-size="9" fill="#475569">群聊高价值内容</text>
  <text x="800" y="333" text-anchor="middle" font-size="9" fill="#475569">↔ Wiki主题索引匹配</text>
  <text x="800" y="348" text-anchor="middle" font-size="9" fill="#94A3B8">条件：chat_groups 非空</text>

  <!-- Context isolation labels -->
  <rect x="60" y="375" width="220" height="20" rx="4" fill="#F1F5F9"/>
  <text x="170" y="389" text-anchor="middle" font-size="8" fill="#64748B">输入：元数据 + 链接列表（O(C/k)）</text>
  <rect x="310" y="375" width="200" height="20" rx="4" fill="#F1F5F9"/>
  <text x="410" y="389" text-anchor="middle" font-size="8" fill="#64748B">输入：内容摘要（O(C/k)）</text>
  <rect x="540" y="375" width="160" height="20" rx="4" fill="#F1F5F9"/>
  <text x="620" y="389" text-anchor="middle" font-size="8" fill="#64748B">输入：断言 + IM搜索</text>
  <rect x="720" y="375" width="160" height="20" rx="4" fill="#F1F5F9"/>
  <text x="800" y="389" text-anchor="middle" font-size="8" fill="#64748B">输入：IM扫描 + 索引</text>

  <!-- Handoff arrows with 200-word label -->
  <line x1="170" y1="395" x2="370" y2="435" stroke="#94A3B8" stroke-width="1"/>
  <line x1="410" y1="395" x2="420" y2="435" stroke="#94A3B8" stroke-width="1"/>
  <line x1="620" y1="395" x2="490" y2="435" stroke="#94A3B8" stroke-width="1"/>
  <line x1="800" y1="395" x2="530" y2="435" stroke="#94A3B8" stroke-width="1"/>
  <text x="450" y="425" text-anchor="middle" font-size="9" fill="#6366F1">≤200字 handoff 摘要</text>

  <!-- Synthesis Box -->
  <rect x="280" y="440" width="340" height="80" rx="12" fill="url(#reportGrad)" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="465" text-anchor="middle" font-size="13" font-weight="600" fill="#064E3B">📋 综合诊断报告</text>
  <text x="450" y="483" text-anchor="middle" font-size="10" fill="#065F46">7维交叉验证 + P0/P1/P2 + 泄漏↔空洞匹配</text>
  <text x="450" y="500" text-anchor="middle" font-size="10" fill="#065F46">知识复利指数计算</text>
  <text x="450" y="515" text-anchor="middle" font-size="9" fill="#059669">主CC直接执行：Inbox Aging + Coverage Gap</text>

  <!-- Output arrows -->
  <line x1="350" y1="520" x2="200" y2="558" stroke="#10B981" stroke-width="1.5"/>
  <line x1="450" y1="520" x2="450" y2="558" stroke="#10B981" stroke-width="1.5"/>
  <line x1="550" y1="520" x2="700" y2="558" stroke="#10B981" stroke-width="1.5"/>

  <!-- Output boxes -->
  <rect x="100" y="558" width="200" height="50" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1" filter="url(#shadow)"/>
  <text x="200" y="580" text-anchor="middle" font-size="11" font-weight="500" fill="#1F2937">📄 健康报告</text>
  <text x="200" y="596" text-anchor="middle" font-size="9" fill="#6B7280">P0/P1/P2 发现 + 修复建议</text>

  <rect x="350" y="558" width="200" height="50" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="580" text-anchor="middle" font-size="11" font-weight="500" fill="#1F2937">📊 复利仪表板</text>
  <text x="450" y="596" text-anchor="middle" font-size="9" fill="#6B7280">录入率/引用率/更新率/泄漏率</text>

  <rect x="600" y="558" width="200" height="50" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1" filter="url(#shadow)"/>
  <text x="700" y="580" text-anchor="middle" font-size="11" font-weight="500" fill="#1F2937">🔔 通知 + 校准</text>
  <text x="700" y="596" text-anchor="middle" font-size="9" fill="#6B7280">@owner提醒 + 阈值自动调整</text>

  <!-- Feedback loop -->
  <path d="M 800 595 Q 860 595 860 460 Q 860 100 720 85" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="872" y="340" text-anchor="middle" font-size="9" fill="#7C3AED" transform="rotate(90, 872, 340)">自校准反馈循环</text>
  <polygon points="720,80 725,90 715,90" fill="#A78BFA"/>

  <!-- Legend -->
  <rect x="30" y="630" width="840" height="38" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <circle cx="60" cy="649" r="6" fill="#0EA5E9"/>
  <text x="72" y="653" font-size="9" fill="#475569">必选Agent</text>
  <circle cx="160" cy="649" r="6" fill="#F59E0B"/>
  <text x="172" y="653" font-size="9" fill="#475569">条件Agent（需chat_groups）</text>
  <text x="350" y="653" font-size="9" fill="#475569">💡 v1.1(5 Agent) → v1.2(3+2 Agent)：token -30~40%，增量续检 -50~80%</text>

  <!-- Version tag -->
  <rect x="15" y="5" width="60" height="22" rx="4" fill="#EEF2FF"/>
  <text x="45" y="20" text-anchor="middle" font-size="9" font-weight="600" fill="#4F46E5">v1.2</text>
</svg>
