<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F9FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E0F2FE;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="reportGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D1FAE5;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#FAFAFA" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1E1B4B">Knowledge Healer — 系统架构</text>

  <!-- Main CC Box -->
  <rect x="180" y="55" width="540" height="80" rx="12" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="450" y="85" text-anchor="middle" font-size="15" font-weight="600" fill="white">主 CC（调度者 + 综合者）</text>
  <text x="450" y="108" text-anchor="middle" font-size="11" fill="#E0E7FF">初始化 → 文档采集 → 分派Agent → 综合报告 → 知识复利指数</text>
  <text x="450" y="124" text-anchor="middle" font-size="10" fill="#C7D2FE">直接执行：Inbox Aging / Coverage Gap</text>

  <!-- Spawn arrows -->
  <line x1="270" y1="135" x2="110" y2="175" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="360" y1="135" x2="280" y2="175" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="450" y1="135" x2="450" y2="175" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="540" y1="135" x2="620" y2="175" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="630" y1="135" x2="790" y2="175" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="450" y="165" text-anchor="middle" font-size="10" fill="#6366F1">spawn (并行)</text>

  <!-- Agent 1: Staleness -->
  <rect x="40" y="180" width="140" height="100" rx="10" fill="url(#agentGrad)" stroke="#0EA5E9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="205" text-anchor="middle" font-size="12" font-weight="600" fill="#0C4A6E">🕐 Staleness</text>
  <text x="110" y="222" text-anchor="middle" font-size="9" fill="#0369A1">过期检测</text>
  <line x1="50" y1="232" x2="170" y2="232" stroke="#BAE6FD" stroke-width="0.5"/>
  <text x="110" y="248" text-anchor="middle" font-size="9" fill="#475569">多信号加权判定</text>
  <text x="110" y="263" text-anchor="middle" font-size="9" fill="#475569">文档类型×有效期</text>

  <!-- Agent 2: Contradiction -->
  <rect x="210" y="180" width="140" height="100" rx="10" fill="url(#agentGrad)" stroke="#0EA5E9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="280" y="205" text-anchor="middle" font-size="12" font-weight="600" fill="#0C4A6E">⚡ Conflict</text>
  <text x="280" y="222" text-anchor="middle" font-size="9" fill="#0369A1">冲突检测</text>
  <line x1="220" y1="232" x2="340" y2="232" stroke="#BAE6FD" stroke-width="0.5"/>
  <text x="280" y="248" text-anchor="middle" font-size="9" fill="#475569">主题聚类对比</text>
  <text x="280" y="263" text-anchor="middle" font-size="9" fill="#475569">权威源识别</text>

  <!-- Agent 3: Links -->
  <rect x="380" y="180" width="140" height="100" rx="10" fill="url(#agentGrad)" stroke="#0EA5E9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="205" text-anchor="middle" font-size="12" font-weight="600" fill="#0C4A6E">🔗 Links</text>
  <text x="450" y="222" text-anchor="middle" font-size="9" fill="#0369A1">断链检测</text>
  <line x1="390" y1="232" x2="510" y2="232" stroke="#BAE6FD" stroke-width="0.5"/>
  <text x="450" y="248" text-anchor="middle" font-size="9" fill="#475569">链接有效性校验</text>
  <text x="450" y="263" text-anchor="middle" font-size="9" fill="#475569">隐式引用匹配</text>

  <!-- Agent 4: Drift -->
  <rect x="550" y="180" width="140" height="100" rx="10" fill="url(#agentGrad)" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="205" text-anchor="middle" font-size="12" font-weight="600" fill="#78350F">🌊 Drift</text>
  <text x="620" y="222" text-anchor="middle" font-size="9" fill="#92400E">漂移检测</text>
  <line x1="560" y1="232" x2="680" y2="232" stroke="#FDE68A" stroke-width="0.5"/>
  <text x="620" y="248" text-anchor="middle" font-size="9" fill="#475569">文档断言 vs 群聊</text>
  <text x="620" y="263" text-anchor="middle" font-size="9" fill="#475569">跨源交叉验证</text>

  <!-- Agent 5: Leakage -->
  <rect x="720" y="180" width="140" height="100" rx="10" fill="url(#agentGrad)" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="790" y="205" text-anchor="middle" font-size="12" font-weight="600" fill="#78350F">💧 Leakage</text>
  <text x="790" y="222" text-anchor="middle" font-size="9" fill="#92400E">管线泄漏</text>
  <line x1="730" y1="232" x2="850" y2="232" stroke="#FDE68A" stroke-width="0.5"/>
  <text x="790" y="248" text-anchor="middle" font-size="9" fill="#475569">群聊高价值内容</text>
  <text x="790" y="263" text-anchor="middle" font-size="9" fill="#475569">↔ Wiki覆盖匹配</text>

  <!-- Data source labels -->
  <rect x="40" y="295" width="140" height="24" rx="4" fill="#F1F5F9"/>
  <text x="110" y="311" text-anchor="middle" font-size="9" fill="#64748B">Wiki/Doc API + metadata</text>
  <rect x="210" y="295" width="140" height="24" rx="4" fill="#F1F5F9"/>
  <text x="280" y="311" text-anchor="middle" font-size="9" fill="#64748B">Doc Content comparison</text>
  <rect x="380" y="295" width="140" height="24" rx="4" fill="#F1F5F9"/>
  <text x="450" y="311" text-anchor="middle" font-size="9" fill="#64748B">Link HTTP Check</text>
  <rect x="550" y="295" width="140" height="24" rx="4" fill="#F1F5F9"/>
  <text x="620" y="311" text-anchor="middle" font-size="9" fill="#64748B">IM Search (反驳信号)</text>
  <rect x="720" y="295" width="140" height="24" rx="4" fill="#F1F5F9"/>
  <text x="790" y="311" text-anchor="middle" font-size="9" fill="#64748B">IM Scan + Wiki Match</text>

  <!-- Converge arrows -->
  <line x1="110" y1="319" x2="370" y2="365" stroke="#94A3B8" stroke-width="1"/>
  <line x1="280" y1="319" x2="400" y2="365" stroke="#94A3B8" stroke-width="1"/>
  <line x1="450" y1="319" x2="450" y2="365" stroke="#94A3B8" stroke-width="1"/>
  <line x1="620" y1="319" x2="500" y2="365" stroke="#94A3B8" stroke-width="1"/>
  <line x1="790" y1="319" x2="530" y2="365" stroke="#94A3B8" stroke-width="1"/>

  <!-- Synthesis Box -->
  <rect x="280" y="365" width="340" height="90" rx="12" fill="url(#reportGrad)" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="393" text-anchor="middle" font-size="13" font-weight="600" fill="#064E3B">📋 综合诊断报告</text>
  <text x="450" y="413" text-anchor="middle" font-size="10" fill="#065F46">7维交叉验证 + P0/P1/P2优先级</text>
  <text x="450" y="430" text-anchor="middle" font-size="10" fill="#065F46">泄漏 ↔ 空洞自动匹配修复方案</text>
  <text x="450" y="447" text-anchor="middle" font-size="10" fill="#065F46">知识复利指数计算</text>

  <!-- Output arrows -->
  <line x1="350" y1="455" x2="200" y2="495" stroke="#10B981" stroke-width="1.5"/>
  <line x1="450" y1="455" x2="450" y2="495" stroke="#10B981" stroke-width="1.5"/>
  <line x1="550" y1="455" x2="700" y2="495" stroke="#10B981" stroke-width="1.5"/>

  <!-- Output boxes -->
  <rect x="100" y="495" width="200" height="55" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1" filter="url(#shadow)"/>
  <text x="200" y="518" text-anchor="middle" font-size="11" font-weight="500" fill="#1F2937">📄 健康报告</text>
  <text x="200" y="536" text-anchor="middle" font-size="9" fill="#6B7280">P0/P1/P2 发现 + 修复建议</text>

  <rect x="350" y="495" width="200" height="55" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="518" text-anchor="middle" font-size="11" font-weight="500" fill="#1F2937">📊 复利仪表板</text>
  <text x="450" y="536" text-anchor="middle" font-size="9" fill="#6B7280">录入率/引用率/更新率/泄漏率</text>

  <rect x="600" y="495" width="200" height="55" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1" filter="url(#shadow)"/>
  <text x="700" y="518" text-anchor="middle" font-size="11" font-weight="500" fill="#1F2937">🔔 通知 + 校准</text>
  <text x="700" y="536" text-anchor="middle" font-size="9" fill="#6B7280">@owner提醒 + 阈值自动调整</text>

  <!-- Feedback loop -->
  <path d="M 800 530 Q 860 530 860 460 Q 860 100 720 85" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="870" y="310" text-anchor="middle" font-size="9" fill="#7C3AED" transform="rotate(90, 870, 310)">自校准反馈循环</text>
  <polygon points="720,80 725,90 715,90" fill="#A78BFA"/>

  <!-- Version tag -->
  <rect x="15" y="585" width="60" height="22" rx="4" fill="#EEF2FF"/>
  <text x="45" y="600" text-anchor="middle" font-size="9" font-weight="600" fill="#4F46E5">v1.1</text>
</svg>
